name: Build Mac DMG

# Runs when you manually trigger it from GitHub
on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Mac DMG
        run: npx electron-builder --mac dmg --publish never

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Contrary-Convertor-Mac
          path: dist/*.dmg
          retention-days: 30
